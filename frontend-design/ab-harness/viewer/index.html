<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acme Console — Harness A/B Viewer</title>
  <style>
    :root { color-scheme: light dark; --bg: #0b0d12; --panel: #151820; --border: #2a3040; --text: #e8eaef; --muted: #9aa3b5; --accent: #60a5fa; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
    header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--panel); }
    header h1 { font-size: 1.1rem; margin-bottom: 0.25rem; }
    header p { font-size: 0.85rem; color: var(--muted); }
    .toolbar { padding: 0.75rem 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); }
    .toolbar a { color: var(--accent); text-decoration: none; padding: 0.35rem 0.65rem; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; }
    main { padding: 1rem 1.5rem 2rem; }
    .scenario { margin-bottom: 2rem; }
    .scenario h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin-bottom: 0.5rem; }
    .split { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    .split img { width: 100%; border: 1px solid var(--border); border-radius: 6px; background: #fff; }
    .label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
    @media (max-width: 900px) { .split { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header>
    <h1>Acme Console harness — multi-page A/B</h1>
    <p>12 scenarios × 2 builds. Live apps: reference (8775) vs no-skill (8776).</p>
  </header>
  <div class="toolbar">
    <a href="http://localhost:8775/#/dashboard" target="_blank">With skill app</a>
    <a href="http://localhost:8776/#/dashboard" target="_blank">Without skill app</a>
  </div>
  <main id="grid"></main>
  <script>
    const scenarios = [
      'dashboard-light','dashboard-dark','projects-list','projects-empty-filter',
      'project-detail','settings-profile','settings-sessions','settings-sessions-scrolled',
      'settings-connections','modal-revoke','profile-save-success','dashboard-tablet'
    ];
    const withBase = '../artifacts/ab-1782654355804/with-skill/';
    const withoutBase = '../artifacts/ab-1782654355804/without-skill/';
    const grid = document.getElementById('grid');
    for (const id of scenarios) {
      const sec = document.createElement('section');
      sec.className = 'scenario';
      sec.innerHTML = `<h2>${id}</h2><div class="split">
        <div><div class="label">With skill</div><img src="${withBase}${id}.png" alt="with ${id}"></div>
        <div><div class="label">Without skill</div><img src="${withoutBase}${id}.png" alt="without ${id}"></div>
      </div>`;
      grid.appendChild(sec);
    }
  </script>
</body>
</html>
